<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSE160 Assignment 3</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #0a0a0f;
      font-family: system-ui, sans-serif;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
    }
    #hud {
      position: fixed;
      left: 12px;
      bottom: 12px;
      color: #e8e8f0;
      font-size: 13px;
      line-height: 1.5;
      text-shadow: 0 1px 3px #000;
      max-width: min(440px, 92vw);
      pointer-events: none;
    }
    #title {
      position: fixed;
      left: 12px;
      top: 10px;
      color: #dde;
      font-size: 15px;
      text-shadow: 0 1px 4px #000;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="title">Alice's Wonderland Ruins</div>
  <canvas id="webgl" width="800" height="600"></canvas>
  <div id="hud"></div>

  <script src="world-project/lib/webgl-utils.js"></script>
  <script src="world-project/lib/webgl-debug.js"></script>
  <script src="world-project/lib/cuon-utils.js"></script>
  <script src="world-project/lib/cuon-matrix-cse160.js"></script>

  <script>
    window.ASSET_ROOT = 'world-project/';
  </script>

  <script src="world-project/camera.js"></script>

  <script src="world-project/geometry/geometry.js"></script>
  <script src="world-project/geometry/cube.js"></script>
  <script src="world-project/geometry/square.js"></script>
  <script src="world-project/geometry/triangle.js"></script>

  <script src="world-project/asg3.js"></script>
</body>
</html>
